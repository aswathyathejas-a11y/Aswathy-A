<!DOCTYPE html>
<html>
<head>
    <title>Employee List</title>
</head>
<body>

<h2>Employee List</h2>

<a href="/employees/add/">Add Employee</a>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Department</th>
    </tr>

    {% for emp in employees %}
    <tr>
        <td>{{ emp.name }}</td>
        <td>{{ emp.email }}</td>
        <td>{{ emp.phone }}</td>
        <td>{{ emp.department }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="4">No employees found</td>
    </tr>
    {% endfor %}

</table>

<br>
<a href="/dashboard/">Back to Dashboard</a>

</body>
</html>
